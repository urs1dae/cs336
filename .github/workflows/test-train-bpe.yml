name: test-train-bpe

on:
  push:
  pull_request:

jobs:
  test-train-bpe-targeted:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run targeted BPE tests
        run: >-
          uv run --project assignment1-basics pytest
          assignment1-basics/tests/test_train_bpe.py::test_train_bpe_speed
          assignment1-basics/tests/test_train_bpe.py::test_train_bpe
          assignment1-basics/tests/test_train_bpe.py::test_train_bpe_special_tokens
