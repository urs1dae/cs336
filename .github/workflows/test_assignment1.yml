name: test-train-bpe

on:
  pull_request:

jobs:
  test-train-bpe-targeted:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv and venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            assignment1-basics/.venv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --project assignment1-basics

      - name: Run tests
        run: >-
          uv run --project assignment1-basics pytest
          assignment1-basics/tests/test_train_bpe.py
          assignment1-basics/tests/test_tokenizer.py
          assignment1-basics/tests/test_model.py